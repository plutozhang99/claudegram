<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fa520f">
  <title>claudegram</title>
  <link rel="manifest" href="/web/manifest.webmanifest">
  <link rel="icon" href="/web/icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="/web/style.css">
</head>
<body>
  <a href="#messages" class="skip-link">Skip to messages</a>

  <header>
    <button class="sidebar-toggle" id="sidebar-toggle" aria-controls="sidebar" aria-expanded="false" aria-label="Toggle sessions sidebar">&#9776;</button>
    <h1 class="app-name">claudegram</h1>
    <div class="status-bar" role="status" aria-live="polite" aria-label="System status">
      <span class="status-pill" id="system-pill" data-state="connecting" title="claudegram server connection">
        <span class="status-label">sys</span>
        <span class="status-value">connecting</span>
      </span>
      <span class="status-pill" id="fakechat-pill" data-state="empty" title="fakechat sessions online / total">
        <span class="status-label">fakechat</span>
        <span class="status-value">0/0</span>
      </span>
    </div>
  </header>

  <div class="layout">
    <aside id="sidebar" aria-label="Sessions">
      <div class="sidebar-header">
        <h2 class="sidebar-heading">Sessions</h2>
        <button type="button" id="clear-offline-btn" class="sidebar-action" title="Delete all offline sessions" aria-label="Delete all offline sessions">Clear offline</button>
      </div>
      <ul id="session-list" role="listbox" aria-label="Open sessions">
        <li class="session-placeholder" role="presentation">loading&hellip;</li>
      </ul>
    </aside>

    <main aria-label="Messages">
      <ol class="messages" id="messages" aria-live="polite" aria-label="Message history"></ol>

      <form class="compose" id="compose" aria-label="Compose message">
        <label for="compose-text" class="sr-only">Message</label>
        <textarea
          id="compose-text"
          name="text"
          rows="3"
          placeholder="Type a message&hellip;"
          autocomplete="off"
        ></textarea>
        <div class="compose-row">
          <div class="session-meta" id="session-meta" aria-live="polite" aria-label="Session status and Claude Code metrics">
            <span class="session-badge" id="session-badge" data-connected="none" title="No active session">
              <span class="session-dot" aria-hidden="true"></span>
              <span class="session-badge-name" id="session-badge-name">no session</span>
            </span>
            <div class="statusline" id="statusline" aria-label="Claude Code statusline"></div>
          </div>
          <button type="submit" id="send-btn" disabled aria-label="Send message">Send</button>
        </div>
      </form>
    </main>
  </div>

  <script type="module" src="/web/js/index.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((err) => { console.warn('[SW]', err); });
      });
    }
  </script>
</body>
</html>
